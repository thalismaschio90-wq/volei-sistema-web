{% extends "base.html" %}

{% block conteudo %}
<section class="painel">
    <div class="topo-painel">
        <h2>Editar Usuário</h2>
        <a href="{{ url_for('usuarios') }}" class="botao botao-secundario">Voltar</a>
    </div>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    {% if sucesso %}
        <p class="sucesso">{{ sucesso }}</p>
    {% endif %}

    <form method="POST" class="formulario" id="form-editar-usuario">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ usuario.nome }}" required>

        <label for="senha">Nova senha (deixe em branco para manter)</label>
        <input type="text" id="senha" name="senha">

        <label for="perfil">Perfil</label>
        <select id="perfil" name="perfil" required onchange="alternarCampoPrazoEdicao()">
            {% if session.get("perfil") == "superadmin" %}
                <option value="superadmin" {% if usuario.perfil == "superadmin" %}selected{% endif %}>superadmin</option>
                <option value="organizador" {% if usuario.perfil == "organizador" %}selected{% endif %}>organizador</option>
                <option value="mesario" {% if usuario.perfil == "mesario" %}selected{% endif %}>mesario</option>
                <option value="equipe" {% if usuario.perfil == "equipe" %}selected{% endif %}>equipe</option>
            {% else %}
                <option value="mesario" {% if usuario.perfil == "mesario" %}selected{% endif %}>mesario</option>
                <option value="equipe" {% if usuario.perfil == "equipe" %}selected{% endif %}>equipe</option>
            {% endif %}
        </select>

        <div id="campo-acesso-ate-edicao" style="display: none;">
            <label for="acesso_ate">Prazo de acesso do organizador</label>
            <input
                type="datetime-local"
                id="acesso_ate"
                name="acesso_ate"
                value="{{ usuario.acesso_ate if usuario.acesso_ate else '' }}"
            >
        </div>

        <label class="checkbox-linha">
            <input type="checkbox" name="ativo" {% if usuario.ativo %}checked{% endif %}>
            Usuário ativo
        </label>

        <button type="submit" class="botao">Salvar alterações</button>
    </form>
</section>

<script>
function alternarCampoPrazoEdicao() {
    const perfil = document.getElementById("perfil").value;
    const campo = document.getElementById("campo-acesso-ate-edicao");
    const input = document.getElementById("acesso_ate");

    if (perfil === "organizador") {
        campo.style.display = "block";
        input.required = true;
    } else {
        campo.style.display = "none";
        input.required = false;
    }
}

document.addEventListener("DOMContentLoaded", alternarCampoPrazoEdicao);
</script>
{% endblock %}
