{% extends "base.html" %}

{% block conteudo %}
<section class="painel">
    <div class="topo-painel">
        <h2>Editar Usuário</h2>
        <a class="botao botao-secundario" href="{{ url_for('usuarios') }}">Voltar</a>
    </div>

    <form method="POST" class="formulario">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ usuario.nome }}" required>

        <label for="login_visual">Login</label>
        <input type="text" id="login_visual" value="{{ login_usuario }}" disabled>

        <label for="senha">Nova senha (se quiser trocar)</label>
        <input type="text" id="senha" name="senha">

        <label for="perfil">Perfil</label>
        <select id="perfil" name="perfil" required>
            <option value="superadmin" {% if usuario.perfil == "superadmin" %}selected{% endif %}>superadmin</option>
            <option value="organizador" {% if usuario.perfil == "organizador" %}selected{% endif %}>organizador</option>
            <option value="mesario" {% if usuario.perfil == "mesario" %}selected{% endif %}>mesario</option>
            <option value="equipe" {% if usuario.perfil == "equipe" %}selected{% endif %}>equipe</option>
        </select>

        <label class="checkbox-linha">
            <input type="checkbox" name="ativo" {% if usuario.ativo %}checked{% endif %}>
            Usuário ativo
        </label>

        <button type="submit" class="botao">Salvar alterações</button>
    </form>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    {% if sucesso %}
        <p class="sucesso">{{ sucesso }}</p>
    {% endif %}
</section>
{% endblock %}
